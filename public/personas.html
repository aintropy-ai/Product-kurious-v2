<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurious — User Personas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D0D0D;
      --nav:     #111111;
      --card:    #1A1A1A;
      --card2:   #1C1C1E;
      --border:  #2A2A2A;
      --text:    #FFFFFF;
      --muted:   #A0A0A0;
      --cyan:    #00D4FF;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 24px; }
    .nav-logo span { font-size: 15px; font-weight: 600; color: var(--text); }
    .nav-badge { font-size: 10px; color: #666; border: 1px solid #333; border-radius: 99px; padding: 2px 7px; }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .nav-link:hover { color: var(--cyan); }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 80px 40px 60px;
      max-width: 720px;
      margin: 0 auto;
    }
    .hero-tag {
      display: inline-block;
      font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: var(--cyan); background: rgba(0,212,255,.08);
      border: 1px solid rgba(0,212,255,.2); border-radius: 99px;
      padding: 4px 14px; margin-bottom: 24px;
    }
    .hero h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 800; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 16px; }
    .hero h1 span { color: var(--cyan); }
    .hero p { font-size: 17px; color: var(--muted); line-height: 1.6; }

    /* ── PERSONA GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    /* ── PERSONA CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .card-accent {
      height: 4px;
      width: 100%;
    }

    .card-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 22px 16px;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.08);
    }
    .card-name { font-size: 17px; font-weight: 700; color: var(--text); }
    .card-role { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 500; }

    .card-quote {
      margin: 0 22px 18px;
      font-size: 13px; font-style: italic; color: var(--muted);
      line-height: 1.55;
      padding: 12px 14px;
      background: var(--card2);
      border-radius: 10px;
      border-left: 3px solid;
      position: relative;
    }
    .card-quote::before {
      content: '"';
      font-size: 32px; font-style: normal; font-weight: 800;
      position: absolute; top: -4px; left: 10px;
      opacity: .2; line-height: 1;
    }

    /* before/after */
    .before-after {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin: 0 22px 18px;
    }
    .ba-box {
      border-radius: 10px; padding: 10px 12px;
    }
    .ba-box.before { background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15); }
    .ba-box.after  { background: rgba(0,212,255,.06); border: 1px solid rgba(0,212,255,.15); }
    .ba-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
    .ba-box.before .ba-label { color: #EF4444; }
    .ba-box.after  .ba-label { color: var(--cyan); }
    .ba-text { font-size: 12px; color: var(--muted); line-height: 1.4; }

    /* journey */
    .journey-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); padding: 0 22px 10px;
    }
    .journey {
      padding: 0 22px 22px;
      display: flex; flex-direction: column; gap: 0;
    }
    .step {
      display: flex; gap: 12px; align-items: flex-start;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 14px; top: 28px;
      width: 1px; height: calc(100% + 2px);
      background: var(--border);
    }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      border: 1.5px solid;
      margin-top: 2px; z-index: 1;
      background: var(--card);
    }
    .step-body { padding-bottom: 16px; flex: 1; }
    .step-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .step-desc  { font-size: 12px; color: var(--muted); line-height: 1.45; }

    /* superpower badge */
    .superpower {
      margin: 0 22px 22px;
      padding: 10px 14px;
      border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 500;
    }
    .superpower-icon { font-size: 16px; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      text-align: center;
      padding: 20px 40px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-divider h2 {
      font-size: 28px; font-weight: 700; letter-spacing: -.02em;
      color: var(--text); margin-bottom: 8px;
    }
    .section-divider p { font-size: 15px; color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 32px 40px;
      font-size: 12px; color: #444;
    }
    footer span { color: var(--cyan); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="./index.html">
    <img src="./logo.png" alt="Kurious" />
    <span>Kurious</span>
    <span class="nav-badge">alpha</span>
  </a>
  <a class="nav-link" href="./index.html">← Back to app</a>
